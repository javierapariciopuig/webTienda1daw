<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto - Grand Slam Market</title>
    <link rel="stylesheet" href="/webTienda1daw/Contacto/EstilosContacto/contacto.css">
   
</head>
<body>
    <div id="header"></div>
    <div>
      <img id="img_firebase" src="" alt="Imagen de la tienda" style="width:100%; max-width:400px; display:none;">
    </div>
    <div class="container">
        <div class="header-contacto">
            <div class="top-mail-container">
                <img id="url_icono_email" src="" alt="" class="svg-mail-header">
            </div>
            <div class="title-with-ball">
                <h1 id="titulo_principal"></h1>
            </div>
            <p id="desc_principal"></p>
        </div>
    </div>

        <div class="contact-grid">
            <section class="form-block">
                <h2 id="form_title" class="form-title-blue"></h2>
                <form id="contactForm">
                    <label id="lbl_name"></label>
                    <input id="input_name" type="text" name="name" placeholder="Tu nombre" required>
                    <label id="lbl_email"></label>
                    <input id="input_email" type="email" name="email" placeholder="tu@email.com" required>
                    <label id="lbl_phone"></label>
                    <input id="input_phone" type="tel" name="phone" placeholder="+34 600 000 000">
                    <label id="lbl_message"></label>
                    <textarea id="input_message" name="message" rows="4" placeholder="¿En qué podemos ayudarte?" required></textarea>
                    
                    <div id="formMessage" style="margin: 10px 0; padding: 10px; border-radius: 4px; display: none;"></div>
                    
                    <button id="" type="submit" class="btn-enviar">
                        <span id="btn_enviar"></span>
                    </button>
                </form>
            </section>
            <!--SCRIPT PARA ENVIAR CORREO-->
            <script>
                document.getElementById("contactForm").addEventListener("submit", function(e) {
                 e.preventDefault();

                const nombre = document.getElementById("input_name").value;
                const email = document.getElementById("input_email").value;
                const telefono = document.getElementById("input_phone").value;
                const mensaje = document.getElementById("input_message").value;

                const subject = encodeURIComponent("Nuevo mensaje de " + nombre);

            const body = encodeURIComponent(
            "Nombre: " + nombre + "\n" +
            "Email: " + email + "\n" +
            "Teléfono: " + telefono + "\n\n" +
            "Mensaje:\n" + mensaje
            );

            const mailtoLink = `mailto:info@grandslammarket.com?subject=${subject}&body=${body}`;

            window.open(mailtoLink, "_blank");
            });
            </script>


            <aside class="info-sidebar">
                <div class="info-card bg-blue">
                    <img id="url_icono_lugar" src="" alt="" class="icon-svg icon-style">
                    <div class="info-text">
                        <h3 id="title_direccion"></h3>
                        <p id="info-direccion"></p>
                    </div>
                </div>

                <div class="info-card bg-red">
                    <img id="url_icono_tel " src="" alt="" class="icon-svg icon-style">
                    <div class="info-text">
                        <h3 id="title_tel"></h3>
                        <p id="info_tel"></p>
                    </div>
                </div>

                <div class="info-card bg-green">
                    <img id="url_icono_email_blanco" src="" alt="" class="icon-svg icon-style">
                    <div class="info-text">
                        <h3 id="title_email"></h3>
                        <p id="info_email"></p>
                    </div>
                </div>

                <div class="info-card bg-purple">
                    <img id="url_icono_horario " src="" alt="" class="icon-svg icon-style">
                    <div class="info-text">
                        <h3 id="title_horario"></h3>
                        <p id="info_horario"></p>
                    </div>
                </div>

              <a href="https://www.google.com/maps/search/?api=1&query=Calle+del+Maiz+11+28045+Madrid" target="_blank" class="mapa-visual-container border-blue">
                    <iframe id="db-map" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3038.563724361555!2d-3.69345!3d40.396!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd4226260a95e09f%3A0x6d9f3b1b1b1b1b1b!2sCalle%20del%20Ma%C3%ADz%2C%2011%2C%2028045%20Madrid!5e0!3m2!1ses!2ses!4v1700000000000!5m2!1ses!2ses" allowfullscreen="" loading="lazy"></iframe>
                    <div class="capa-clic"></div>
                </a>
            </aside>
        </div>

        <section class="faq-container-general">
            <div class="faq-header-inline">
                <h2 id="faq_title" class="faq-main-title"></h2>
            </div>
            <div class="faq-grid">
                <div class="faq-item-white">
                    <h4 id="faq_q1" class="q-title"></h4>
                    <p id="faq_a1"></p>
                </div>
                <div class="faq-item-white">
                    <h4 id="faq_q2" class="q-title"></h4>
                    <p id="faq_a2"></p>
                </div>
                <div class="faq-item-white">
                    <h4 id="faq_q3" class="q-title"></h4>
                    <p id="faq_a3"></p>
                </div>
                <div class="faq-item-white">
                    <h4 id="faq_q4" class="q-title"></h4>
                    <p id="faq_a4"></p>
                </div>
            </div>
        </section>
    </div>
    <div id="footer"></div>
    <script type="module" src="/webTienda1daw/Contacto/JS-Contacto/firestorecontacto.js"></script>

<script>
  fetch("/webTienda1daw/Footer/footer.html")
    .then(response => response.text())
    .then(data => {
      document.getElementById("footer").innerHTML = data;
      import("/webTienda1daw/Footer/JS-Footer/firestorefooter.js");
    });
</script>
<script>
  fetch("/webTienda1daw/HEADER/header.html")
    .then(r => r.text())
    .then(html => document.getElementById("header").innerHTML = html);
</script>
</body>
</html>
